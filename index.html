<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>智能抢答器 · 比赛控制系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0d1520;
            --card: #182230;
            --accent: #f59e0b;
            --red: #ef4444;
            --green: #10b981;
            --blue: #3b82c4;
            --text: #e8ecf1;
            --text2: #9aa4b2;
            --border: #2a3644;
            --shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 15%, #162030, #080e16);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 10px;
        }
        .phone {
            max-width: 430px; width: 100%; background: var(--bg); border-radius: 42px;
            padding: 14px 12px 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);
            border: 2px solid #323e4e; color: var(--text); display: flex; flex-direction: column; gap: 10px;
        }
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #182230; border-radius: 26px; padding: 7px 14px; font-size:0.78rem; font-weight:600; border:1px solid #2a3644;
        }
        .bt-area { display:flex; align-items:center; gap:6px; }
        .led { width:10px; height:10px; border-radius:50%; background:#4a5a6e; transition:0.3s; }
        .led.active { background:#10b981; box-shadow:0 0 12px #10b981; animation:pulse 1.4s infinite; }
        @keyframes pulse { 0%,100%{opacity:0.6;transform:scale(1);} 50%{opacity:1;transform:scale(1.15);} }
        .clock { font-family:monospace; font-weight:700; font-size:0.85rem; color:#cbd5e1; }
        .btn {
            background:#253040; border:none; padding:6px 12px; border-radius:18px; font-weight:600; font-size:0.66rem;
            color:#e2e8f0; cursor:pointer; display:inline-flex; align-items:center; gap:4px; border:1px solid #3a4a5e;
            transition:0.15s; white-space:nowrap;
        }
        .btn:active { transform:scale(0.94); background:#3a4a5e; }
        .btn-accent { background:#d97706; border-color:#f59e0b; color:#fff; font-weight:700; }
        .btn-danger { background:#b91c1c; border-color:#dc2626; }
        .btn-green { background:#0d7a4a; border-color:#10b981; }
        .btn-blue { background:#1e4d80; border-color:#3b82c4; }
        .btn-reset { background:#4a3050; border-color:#7c5295; }
        .config-panel {
            display:none; background:#182230; border-radius:16px; padding:10px; flex-direction:column; gap:7px; border:1px solid #2a3644;
        }
        .config-panel input {
            background:#0d1520; border:1px solid #2a3644; color:#e2e8f0; padding:5px 10px; border-radius:12px;
            font-family:monospace; font-size:0.62rem; flex:1; outline:none;
        }
        .row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
        .section-label {
            font-weight:700; font-size:0.7rem; color:#f59e0b; letter-spacing:0.5px; display:flex; align-items:center; gap:5px;
        }
        /* 倒计时区 */
        .countdown-box {
            background: linear-gradient(180deg, #1a2432 0%, #101820 100%);
            border-radius: 22px; padding: 14px; text-align:center; border:2px solid #323e4e;
            position:relative; overflow:hidden;
        }
        .countdown-box.answering {
            border-color:#10b981; box-shadow:0 0 28px rgba(16,185,129,0.4);
        }
        .countdown-value {
            font-size: 4.5rem; font-weight: 900; font-family: 'Inter', sans-serif;
            color: #fbbf24; line-height: 1; letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(251,191,36,0.5); transition: color 0.3s;
        }
        .countdown-value.warning { color: #ef4444; animation: blinkFast 0.4s infinite; }
        .countdown-value.zero { color: #10b981; font-size: 2.8rem; text-shadow: 0 0 24px rgba(16,185,129,0.7); }
        @keyframes blinkFast { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
        .countdown-label { font-size:0.7rem; color:#8899aa; margin-top:4px; }
        .set-countdown { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:6px; }
        .set-countdown .set-val { font-size:1.3rem; font-weight:700; color:#d4a574; }
        /* 选手网格 */
        .players-grid {
            display: grid; grid-template-columns: repeat(4,1fr); gap:8px;
        }
        .player-card {
            background: #1a2430; border-radius: 16px; padding: 10px 4px; text-align:center;
            border:2px solid #2a3644; transition:0.25s; position:relative;
        }
        .player-card .player-num { font-size:1.7rem; font-weight:800; color:#6b7d8e; transition:0.2s; }
        .player-card .player-status { font-size:0.55rem; color:#4a5a6e; margin-top:2px; font-weight:600; }
        .player-card.foul {
            border-color:#ef4444; background:#2a1418; box-shadow:0 0 16px rgba(239,68,68,0.55);
            animation: foulShake 0.5s infinite;
        }
        @keyframes foulShake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-2px);} 75%{transform:translateX(2px);} }
        .player-card.foul .player-num { color:#ef4444; }
        .player-card.foul .player-status { color:#fca5a5; }
        .player-card.success {
            border-color:#10b981; background:#14281e; box-shadow:0 0 26px rgba(16,185,129,0.7);
            animation: successPulse 0.6s infinite; transform:scale(1.05); z-index:2;
        }
        @keyframes successPulse { 0%,100%{box-shadow:0 0 16px rgba(16,185,129,0.5);} 50%{box-shadow:0 0 34px rgba(16,185,129,1);} }
        .player-card.success .player-num { color:#10b981; font-size:2rem; }
        .player-card.success .player-status { color:#6ee7b7; font-weight:700; }
        /* 横幅 */
        .banner {
            border-radius:16px; padding:10px 14px; text-align:center; font-weight:700; font-size:0.8rem;
            display:none; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-4px);} to{opacity:1;transform:translateY(0);} }
        .banner.success-banner {
            background:#14281e; border:2px solid #10b981; color:#6ee7b7; font-size:0.9rem;
        }
        .banner.foul-banner {
            background:#2a1418; border:2px solid #ef4444; color:#fca5a5;
        }
        .banner.info-banner {
            background:#141e2a; border:2px solid #3b82c4; color:#93c5fd;
        }
        .banner.show { display:block; }
        .log-box {
            background:#080e16; border-radius:14px; padding:7px 10px; height:55px; overflow-y:auto;
            font-family:monospace; font-size:0.55rem; color:#6b7d8e; border:1px solid #1a2430;
        }
        .log-entry { border-bottom:1px solid #141e2a; padding:2px 0; }
        .log-entry.tx { color:#fbbf24; } .log-entry.rx { color:#10b981; }
    </style>
</head>
<body>
<div class="phone">
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="bt-area">
            <div class="led" id="bleLed"></div>
            <span id="connStatus">未连接</span>
            <button class="btn" id="configToggleBtn"><i class="fas fa-cog"></i></button>
        </div>
        <div class="clock" id="liveClock">--:--:--</div>
    </div>

    <!-- 蓝牙配置 -->
    <div class="config-panel" id="configPanel">
        <div class="row">
            <input id="serviceUuid" value="0000fff0-0000-1000-8000-00805f9b34fb" placeholder="服务UUID">
            <input id="notifyUuid" value="0000fff1-0000-1000-8000-00805f9b34fb" placeholder="通知UUID">
            <input id="writeUuid" value="0000fff1-0000-1000-8000-00805f9b34fb" placeholder="写入UUID">
        </div>
        <div class="row">
            <button class="btn" id="scanBtn"><i class="fas fa-search"></i> 扫描</button>
            <button class="btn" id="connectBtn" disabled>连接</button>
            <button class="btn btn-danger" id="disconnectBtn" disabled>断开</button>
            <button class="btn btn-blue" id="simulateBtn"><i class="fas fa-flask"></i> 模拟</button>
        </div>
    </div>

    <!-- 倒计时区域 -->
    <div class="countdown-box" id="countdownBox">
        <div class="countdown-value" id="realCountdownDisplay">0</div>
        <div class="countdown-label" id="countdownLabel">实时倒计时 (秒)</div>
        <div class="set-countdown">
            <span style="font-size:0.65rem; color:#8899aa;">⏱ 设定:</span>
            <span class="set-val" id="setCountdownDisplay">10</span>
            <span style="font-size:0.65rem; color:#8899aa;">秒</span>
        </div>
        <div class="row" style="justify-content:center; margin-top:6px;">
            <button class="btn" id="setIncBtn">B +</button>
            <button class="btn" id="setDecBtn">C -</button>
            <button class="btn btn-accent" id="startBtn">A 开始</button>
        </div>
    </div>

    <!-- 选手状态 -->
    <div class="section-label"><i class="fas fa-users"></i> 选手面板</div>
    <div class="players-grid" id="playersGrid"></div>

    <!-- 信息横幅 -->
    <div class="banner info-banner show" id="infoBanner">⏳ 等待开始… 键值非1-8时显示"未有选手抢答"</div>
    <div class="banner success-banner" id="successBanner"></div>
    <div class="banner foul-banner" id="foulBanner"></div>

    <!-- 控制按钮 -->
    <div class="row" style="justify-content:center; gap:8px;">
        <button class="btn btn-green" id="voiceBtn"><i class="fas fa-volume-up"></i> D 语音</button>
        <button class="btn btn-danger" id="buzzerBtn"><i class="fas fa-bell"></i> E 蜂鸣</button>
        <button class="btn btn-reset" id="resetBtn"><i class="fas fa-redo"></i> 清除</button>
    </div>

    <!-- 日志 -->
    <div class="log-box" id="sysLog">🎤 抢答器就绪 | 所有时间数据完全来自上传</div>
</div>

<script>
(function() {
    // ==================== DOM ====================
    const bleLed = document.getElementById('bleLed');
    const connStatus = document.getElementById('connStatus');
    const configToggleBtn = document.getElementById('configToggleBtn');
    const configPanel = document.getElementById('configPanel');
    const scanBtn = document.getElementById('scanBtn');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const simulateBtn = document.getElementById('simulateBtn');
    const serviceUuidInput = document.getElementById('serviceUuid');
    const notifyUuidInput = document.getElementById('notifyUuid');
    const writeUuidInput = document.getElementById('writeUuid');
    const sysLog = document.getElementById('sysLog');
    const clockSpan = document.getElementById('liveClock');
    const realCountdownDisplay = document.getElementById('realCountdownDisplay');
    const countdownLabel = document.getElementById('countdownLabel');
    const setCountdownDisplay = document.getElementById('setCountdownDisplay');
    const countdownBox = document.getElementById('countdownBox');
    const startBtn = document.getElementById('startBtn');
    const setIncBtn = document.getElementById('setIncBtn');
    const setDecBtn = document.getElementById('setDecBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const buzzerBtn = document.getElementById('buzzerBtn');
    const resetBtn = document.getElementById('resetBtn');
    const playersGrid = document.getElementById('playersGrid');
    const infoBanner = document.getElementById('infoBanner');
    const successBanner = document.getElementById('successBanner');
    const foulBanner = document.getElementById('foulBanner');

    // ==================== 蓝牙变量 ====================
    let bluetoothDevice = null, gattServer = null, notifyChar = null, writeChar = null, isConnected = false;

    // ==================== 核心数据（完全来自上传） ====================
    let keyValue = 0;               // 当前键值
    let realCountdown = 0;          // 实时倒计时
    let setCountdown = 10;          // 设置倒计时
    let prevKeyValue = 0;           // 上一轮键值
    let prevRealCountdown = 0;      // 上一轮实时倒计时

    // ==================== 状态机 ====================
    // 'idle'      : 初始/待机，实时倒计时=0，尚未开始
    // 'counting'  : 倒计时运行中，实时倒计时>0
    // 'answering' : 倒计时刚结束，实时倒计时变为0，等待抢答
    let gameState = 'idle';
    let foulSet = new Set();        // 本轮违规选手编号集合
    let successPlayer = null;       // 成功抢答选手编号

    // ==================== UI构建 ====================
    function buildPlayers() {
        playersGrid.innerHTML = '';
        for (let i = 1; i <= 8; i++) {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.id = 'playerCard' + i;
            card.innerHTML = `<div class="player-num">${i}</div><div class="player-status">待命</div>`;
            playersGrid.appendChild(card);
        }
    }

    function clearAllPlayerStyles() {
        for (let i = 1; i <= 8; i++) {
            const card = document.getElementById('playerCard' + i);
            if (card) {
                card.classList.remove('foul', 'success');
                card.querySelector('.player-status').textContent = '待命';
            }
        }
    }

    function markPlayerFoul(num) {
        const card = document.getElementById('playerCard' + num);
        if (card) {
            card.classList.remove('success');
            card.classList.add('foul');
            card.querySelector('.player-status').textContent = '违规!';
        }
    }

    function markPlayerSuccess(num) {
        const card = document.getElementById('playerCard' + num);
        if (card) {
            card.classList.remove('foul');
            card.classList.add('success');
            card.querySelector('.player-status').textContent = '★成功!';
        }
    }

    // ==================== 辅助函数 ====================
    function addSysLog(msg, type='system') {
        const div = document.createElement('div');
        div.className = 'log-entry ' + type;
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        sysLog.appendChild(div); sysLog.scrollTop = sysLog.scrollHeight;
        if(sysLog.children.length > 30) sysLog.removeChild(sysLog.children[0]);
    }
    function updateClock() { clockSpan.textContent = new Date().toLocaleTimeString('zh-CN',{hour12:false}); }
    setInterval(updateClock,1000); updateClock();

    function updateConnectionUI(connected) {
        isConnected = connected;
        bleLed.classList.toggle('active', connected);
        connStatus.textContent = connected ? '已连接' : '未连接';
        connectBtn.disabled = connected || !bluetoothDevice;
        disconnectBtn.disabled = !connected;
        scanBtn.disabled = connected;
    }

    async function sendCommand(cmd, desc) {
        if (!isConnected || !writeChar) { addSysLog('⚠️ 未连接: '+cmd, 'tx'); return; }
        try {
            await writeChar.writeValue(new TextEncoder().encode(cmd));
            addSysLog(`📤 ${cmd} (${desc})`, 'tx');
        } catch(e) { addSysLog(`发送失败: ${e.message}`, 'tx'); }
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.05;
            window.speechSynthesis.speak(u);
        }
    }
    function playBeep() {
        try {
            const ctx = new (window.AudioContext||window.webkitAudioContext)();
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value=700; g.gain.value=0.4;
            o.start(); o.stop(ctx.currentTime+0.2);
        } catch(e){}
    }

    // ==================== 更新界面显示 ====================
    function updateDisplay() {
        // 倒计时数字
        realCountdownDisplay.textContent = realCountdown;
        // 倒计时样式
        realCountdownDisplay.classList.remove('warning', 'zero');
        if (gameState === 'counting' && realCountdown <= 3 && realCountdown > 0) {
            realCountdownDisplay.classList.add('warning');
        }
        if (gameState === 'answering' && realCountdown === 0) {
            realCountdownDisplay.classList.add('zero');
            realCountdownDisplay.textContent = '抢!';
        }
        // 倒计时标签
        if (gameState === 'counting') countdownLabel.textContent = '⏳ 倒计时中…';
        else if (gameState === 'answering') countdownLabel.textContent = '🔔 开始抢答！';
        else countdownLabel.textContent = '实时倒计时 (秒)';
        // 倒计时框
        countdownBox.classList.toggle('answering', gameState === 'answering');
        // 设置值
        setCountdownDisplay.textContent = setCountdown;
        // 信息横幅
        if (gameState === 'idle') {
            infoBanner.textContent = '⏳ 等待开始… 键值非1-8时显示"未有选手抢答"';
            infoBanner.classList.add('show');
        } else if (gameState === 'counting') {
            infoBanner.textContent = '⏳ 倒计时中，请勿抢答！';
            infoBanner.classList.add('show');
        } else if (gameState === 'answering' && !successPlayer) {
            infoBanner.textContent = '🔔 开始抢答！请选手按键…';
            infoBanner.classList.add('show');
        } else if (successPlayer) {
            infoBanner.classList.remove('show');
        }
        // 成功横幅
        if (successPlayer) {
            successBanner.textContent = `🎉 选手 ${successPlayer} 抢答成功！`;
            successBanner.classList.add('show');
            infoBanner.classList.remove('show');
        } else {
            successBanner.classList.remove('show');
        }
        // 违规横幅
        if (foulSet.size > 0) {
            const arr = [...foulSet].sort((a,b)=>a-b);
            foulBanner.textContent = `⚠️ 违规抢答: 选手 ${arr.join('、')} — 罚时10分钟！`;
            foulBanner.classList.add('show');
        } else {
            foulBanner.classList.remove('show');
        }
    }

    // ==================== 核心逻辑 ====================
    function processIncomingData() {
        const prevState = gameState;
        // 判断状态转换
        if (prevRealCountdown === 0 && realCountdown > 0) {
            // 倒计时开始：进入counting状态，清除上一轮所有结果
            gameState = 'counting';
            foulSet.clear();
            successPlayer = null;
            clearAllPlayerStyles();
            foulBanner.classList.remove('show');
            successBanner.classList.remove('show');
            addSysLog('▶ 倒计时开始，进入抢答倒计时阶段', 'system');
        } else if (prevRealCountdown > 0 && realCountdown === 0) {
            // 倒计时结束：进入answering状态
            gameState = 'answering';
            addSysLog('⏰ 倒计时结束！开始抢答！', 'system');
            speak('开始抢答');
        }

        // 违规检测：在counting状态中，键值变为1-8
        if (gameState === 'counting' && keyValue >= 1 && keyValue <= 8 && keyValue !== prevKeyValue) {
            if (!foulSet.has(keyValue)) {
                foulSet.add(keyValue);
                markPlayerFoul(keyValue);
                addSysLog(`🚫 选手 ${keyValue} 违规抢答！(倒计时未结束)`, 'system');
                speak(`选手 ${keyValue} 违规抢答！罚时10分钟！`);
                playBeep();
            }
        }

        // 成功检测：在answering状态中，键值从非1-8变为1-8（第一个）
        if (gameState === 'answering' && !successPlayer && keyValue >= 1 && keyValue <= 8 && keyValue !== prevKeyValue) {
            // 检查该选手是否在违规列表中（如果在，仍然算成功，但保留违规记录）
            successPlayer = keyValue;
            markPlayerSuccess(keyValue);
            addSysLog(`🏆 选手 ${keyValue} 成功抢答！`, 'system');
            speak(`选手 ${keyValue} 抢答成功！`);
            // 成功后再显示违规汇总
            if (foulSet.size > 0) {
                const arr = [...foulSet].sort((a,b)=>a-b);
                addSysLog(`⚠️ 违规选手汇总: ${arr.join('、')}`, 'system');
            }
        }

        // 保存状态
        prevKeyValue = keyValue;
        prevRealCountdown = realCountdown;
        updateDisplay();
    }

    // ==================== 数据解析 ====================
    function parseSensorData(raw) {
        const match = raw.match(/#(\d+)#([\d.]+)#([\d.]+)#/);
        if (!match) return;
        const newKey = parseInt(match[1]);
        const newReal = parseFloat(match[2]);
        const newSet = parseFloat(match[3]);
        if (isNaN(newKey) || isNaN(newReal) || isNaN(newSet)) return;
        // 更新全局变量
        prevKeyValue = keyValue;
        prevRealCountdown = realCountdown;
        keyValue = newKey;
        realCountdown = newReal;
        setCountdown = newSet;
        addSysLog(`📥 键值:${keyValue} 实时:${realCountdown} 设置:${setCountdown}`, 'rx');
        processIncomingData();
    }

    function onNotification(event) {
        const val = event.target.value;
        if (!val) return;
        parseSensorData(new TextDecoder('utf-8').decode(val).trim());
    }

    // ==================== 清除 ====================
    function resetAll() {
        gameState = 'idle';
        foulSet.clear();
        successPlayer = null;
        clearAllPlayerStyles();
        successBanner.classList.remove('show');
        foulBanner.classList.remove('show');
        infoBanner.classList.add('show');
        infoBanner.textContent = '⏳ 等待开始… 键值非1-8时显示"未有选手抢答"';
        countdownBox.classList.remove('answering');
        realCountdownDisplay.classList.remove('warning', 'zero');
        realCountdownDisplay.textContent = realCountdown;
        countdownLabel.textContent = '实时倒计时 (秒)';
        addSysLog('🔄 显示已清除，等待新一轮', 'system');
    }

    // ==================== 蓝牙 ====================
    async function scan() {
        if (!navigator.bluetooth) { alert('需要Web Bluetooth'); return; }
        const svc = serviceUuidInput.value.trim(); if(!svc) return alert('输入UUID');
        try {
            const d = await navigator.bluetooth.requestDevice({ filters: [{ services: [svc] }], optionalServices: [svc] });
            bluetoothDevice = d; connectBtn.disabled = false;
            addSysLog(`已选择: ${d.name||d.id}`, 'system');
        } catch(e) { if(!e.message.includes('cancelled')) addSysLog(`扫描错误: ${e.message}`); }
    }
    async function connect() {
        if (!bluetoothDevice) return;
        const svc = serviceUuidInput.value.trim(), ntf = notifyUuidInput.value.trim(), wrt = writeUuidInput.value.trim();
        try {
            gattServer = await bluetoothDevice.gatt.connect();
            const service = await gattServer.getPrimaryService(svc);
            notifyChar = await service.getCharacteristic(ntf);
            await notifyChar.startNotifications();
            notifyChar.addEventListener('characteristicvaluechanged', onNotification);
            if (wrt) { try { writeChar = await service.getCharacteristic(wrt); } catch(e) {} }
            updateConnectionUI(true);
            bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnect);
            addSysLog('✅ 蓝牙已连接', 'system');
        } catch(e) { addSysLog(`连接失败: ${e.message}`); updateConnectionUI(false); }
    }
    function onDisconnect() {
        addSysLog('🔌 断开');
        if (notifyChar) notifyChar.removeEventListener('characteristicvaluechanged', onNotification);
        notifyChar = writeChar = null; updateConnectionUI(false);
    }
    function disconnect() { if (bluetoothDevice?.gatt.connected) bluetoothDevice.gatt.disconnect(); else onDisconnect(); }

    // ==================== 事件绑定 ====================
    configToggleBtn.addEventListener('click', ()=> configPanel.style.display = configPanel.style.display==='none'?'flex':'none');
    scanBtn.addEventListener('click', scan);
    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', disconnect);
    startBtn.addEventListener('click', ()=> sendCommand('A', '开始'));
    setIncBtn.addEventListener('click', ()=> sendCommand('B', '设置+'));
    setDecBtn.addEventListener('click', ()=> sendCommand('C', '设置-'));
    voiceBtn.addEventListener('click', ()=>{ sendCommand('D', '语音播报'); speak('语音播报功能'); });
    buzzerBtn.addEventListener('click', ()=>{ sendCommand('E', '蜂鸣器'); playBeep(); });
    resetBtn.addEventListener('click', resetAll);

    // ==================== 模拟数据 ====================
    let simStep = 0;
    let simTimer = null;
    simulateBtn.addEventListener('click', ()=>{
        if (simTimer) { clearInterval(simTimer); simTimer = null; simStep = 0; addSysLog('⏹ 模拟已停止', 'system'); return; }
        simStep = 0;
        setCountdown = 8;
        keyValue = 0; realCountdown = 0; prevKeyValue = 0; prevRealCountdown = 0;
        resetAll();
        addSysLog('🧪 开始模拟流程 (设置8秒)', 'system');
        // 初始状态
        parseSensorData(`#0#0#8#`);
        simTimer = setInterval(()=>{
            simStep++;
            if (simStep === 1) {
                // 开始倒计时
                parseSensorData(`#0#8#8#`);
            } else if (simStep === 3) {
                // 选手3违规
                parseSensorData(`#3#6#8#`);
            } else if (simStep === 4) {
                // 选手3松开
                parseSensorData(`#0#5#8#`);
            } else if (simStep === 6) {
                // 选手5也违规
                parseSensorData(`#5#3#8#`);
            } else if (simStep === 7) {
                // 选手5松开
                parseSensorData(`#0#2#8#`);
            } else if (simStep === 9) {
                // 倒计时结束
                parseSensorData(`#0#0#8#`);
            } else if (simStep === 11) {
                // 选手2成功抢答
                parseSensorData(`#2#0#8#`);
                clearInterval(simTimer); simTimer = null;
                addSysLog('✅ 模拟完成', 'system');
            }
        }, 1000);
    });

    // ==================== 初始化 ====================
    function init() {
        buildPlayers();
        updateConnectionUI(false);
        realCountdownDisplay.textContent = '0';
        setCountdownDisplay.textContent = setCountdown;
        updateDisplay();
        addSysLog('🎤 抢答器系统就绪');
        addSysLog('💡 倒计时中按键=违规 | 倒计时结束后第一个按键=成功');
    }
    init();
})();
</script>
</body>
</html>
